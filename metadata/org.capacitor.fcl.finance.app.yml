Builds:
  - versionName: 1.3.3
    versionCode: 1
    commit: b364eea1f324dc85c6801cf69b67fb0a083a1243
    subdir: src-capacitor/android/app
    sudo:
      - echo "deb https://deb.debian.org/debian forky main" > /etc/apt/sources.list.d/forky.list
      - apt-get update
      - apt-get install -y -t forky npm
      - npm install yarn @quasar/cli -g
    init:
      - cd ../..
      - yarn install
      - cd ..
      - yarn install
      - yarn build
      - yarn cap:sync:android
    gradle:
      - yes
    scandelete:
      - node_modules
      - src-capacitor/node_modules
    ndk: r21e

