IssueTracker: https://github.com/zgualberto/fcl-finance-app/issues
Changelog: https://github.com/zgualberto/fcl-finance-app/releases

AutoName: FCL Finance App

RepoType: git
Repo: https://github.com/zgualberto/fcl-finance-app

Builds:
  - versionName: 1.0.1
    versionCode: 1
    commit: v1.0.1
    subdir: src-capacitor/android/app
    sudo:
      - sysctl fs.inotify.max_user_watches=524288 || true
      - echo "deb https://deb.debian.org/debian trixie main" > /etc/apt/sources.list.d/trixie.list
      - apt-get update
      - apt-get install -y -t trixie openjdk-21-jdk-headless
      - update-alternatives --auto java
      - curl -Lo node.tar.gz https://nodejs.org/dist/v22.22.0/node-v22.22.0-linux-x64.tar.gz
      - echo "c33c39ed9c80deddde77c960d00119918b9e352426fd604ba41638d6526a4744 node.tar.gz"
        | sha256sum -c -
      - tar xzf node.tar.gz --strip-components=1 -C /usr/local/
      - npm install yarn @quasar/cli -g
    init:
      - cd ../..
      - yarn install
      - cd ..
      - yarn install
      - yarn build
      - yarn cap:sync:android
    gradle:
      - yes
    output: build/outputs/apk/release/app-release-unsigned.apk
    scandelete:
      - node_modules
      - src-capacitor/node_modules

AutoUpdateMode: Version
UpdateCheckMode: Tags
CurrentVersion: 1.0.1
CurrentVersionCode: 1
